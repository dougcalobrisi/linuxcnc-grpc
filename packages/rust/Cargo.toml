[package]
name = "linuxcnc-grpc"
version = "0.5.0"
edition = "2021"
description = "Rust gRPC client for LinuxCNC machine control and HAL"
license = "MIT"
repository = "https://github.com/dougcalobrisi/linuxcnc-grpc"
documentation = "https://docs.rs/linuxcnc-grpc"
keywords = ["linuxcnc", "cnc", "grpc", "machine-control", "hal"]
categories = ["api-bindings", "hardware-support"]
include = ["src/**/*", "proto/**/*", "build.rs", "Cargo.toml"]

[dependencies]
prost = "0.13"
tonic = "0.12"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "process", "time", "io-util"] }

[build-dependencies]
tonic-build = "0.12"

[dev-dependencies]
serde_json = "1.0"
tokio-test = "0.4"
futures-util = "0.3"
serial_test = "3.0"

[features]
default = []
client = []
server = []
