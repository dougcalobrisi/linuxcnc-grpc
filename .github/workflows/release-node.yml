name: Release Node.js

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: cd packages/node && npm ci

      - name: Build
        run: cd packages/node && npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: node-dist
          path: packages/node/dist/

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd packages/node && npm ci

      - name: Run tests
        run: cd packages/node && npm test

  publish:
    needs: [build, test]
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: cd packages/node && npm ci

      - name: Build
        run: cd packages/node && npm run build

      - name: Publish to npm
        run: cd packages/node && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
