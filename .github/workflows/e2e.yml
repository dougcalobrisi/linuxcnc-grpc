name: E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  DISPLAY: ":99"
  LINUXCNC_VERSION: "v2.9.3"

jobs:
  e2e-linuxcnc:
    name: e2e (LinuxCNC simulator)
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Cache LinuxCNC build
        id: cache-linuxcnc
        uses: actions/cache@v5
        with:
          path: ~/linuxcnc
          key: linuxcnc-${{ env.LINUXCNC_VERSION }}-ubuntu2404-v1

      - name: Clone LinuxCNC
        if: steps.cache-linuxcnc.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.LINUXCNC_VERSION }} \
            https://github.com/LinuxCNC/linuxcnc.git ~/linuxcnc

      - name: Install LinuxCNC build dependencies
        run: |
          sudo apt-get update
          # All build deps from LinuxCNC's debian/control.top.in
          sudo apt-get install -y \
            build-essential autoconf automake libtool pkg-config gettext intltool \
            python3 python3-dev python3-tk python3-xlib \
            libboost-python-dev libepoxy-dev \
            libgl1-mesa-dev libglu1-mesa-dev \
            libgtk-3-dev libmodbus-dev libusb-1.0-0-dev \
            libreadline-dev libtirpc-dev libxmu-dev libudev-dev \
            tcl-dev tk-dev bwidget tclx \
            netcat-openbsd procps psmisc \
            xvfb yapps2 desktop-file-utils \
            asciidoc dblatex docbook-xsl groff-base ghostscript imagemagick po4a

      - name: Build LinuxCNC from source
        if: steps.cache-linuxcnc.outputs.cache-hit != 'true'
        run: |
          cd ~/linuxcnc/src
          ./autogen.sh
          # Run-in-place build: no setuid binaries, no install needed
          ./configure --with-realtime=uspace \
            --disable-check-runtime-deps \
            --disable-gtk2 \
            --enable-non-distributable=yes
          make -j$(nproc)

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install project dependencies
        run: |
          uv venv --system-site-packages
          uv sync --extra dev

      - name: Create NC files directory
        run: mkdir -p /tmp/e2e-nc-files

      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          echo "XVFB_PID=$!" >> "$GITHUB_ENV"
          sleep 1

      - name: Start LinuxCNC simulator
        run: |
          source ~/linuxcnc/scripts/rip-environment

          SIM_INI_SRC=$(find ~/linuxcnc/configs/sim -name "axis.ini" -path "*/axis/*" -print -quit)
          if [ -z "$SIM_INI_SRC" ]; then
            echo "::error::Could not find axis.ini sim config"
            find ~/linuxcnc/configs/sim -name "*.ini" | head -20
            exit 1
          fi
          echo "Using sim config: $SIM_INI_SRC"

          # Copy config to /tmp so we don't modify the cached ~/linuxcnc directory.
          # Modifying files in-place causes the Post Cache step's tar to fail with
          # "file changed as we read it".
          SIM_DIR=/tmp/linuxcnc-sim
          cp -r "$(dirname "$SIM_INI_SRC")" "$SIM_DIR"
          SIM_INI="$SIM_DIR/$(basename "$SIM_INI_SRC")"

          # Create a headless display that stays alive indefinitely.
          # The linuxcnc launcher waits for the DISPLAY program to exit,
          # then shuts everything down. Can't use "dummy" — LinuxCNC's
          # built-in dummy display waits for ENTER then exits.
          printf '#!/bin/bash\ntrap "exit 0" SIGTERM SIGINT SIGHUP\nwhile true; do sleep 60; done\n' > ~/linuxcnc/bin/headless
          chmod +x ~/linuxcnc/bin/headless

          # Patch to headless (no GUI)
          sed -i 's/^DISPLAY[[:space:]]*=.*/DISPLAY = headless/' "$SIM_INI"
          grep "^DISPLAY" "$SIM_INI"

          # RUNTESTS=1 skips the linuxcnc script's exec redirections
          # so stdout/stderr are captured in our log file for debugging.
          RUNTESTS=1 linuxcnc "$SIM_INI" > /tmp/linuxcnc-startup.log 2>&1 &
          echo "LINUXCNC_PID=$!" >> "$GITHUB_ENV"

          sleep 15

          echo "=== Processes ==="
          ps aux | grep -E "linuxcnc|milltask|rtapi|halcmd|iocontrol|headless" | grep -v grep || echo "(none)"

      - name: Wait for LinuxCNC
        run: |
          source ~/linuxcnc/scripts/rip-environment
          python3 scripts/wait-for-linuxcnc.py --timeout 90 || {
            echo "=== Startup log ==="
            cat /tmp/linuxcnc-startup.log 2>/dev/null || true
            echo "=== Processes ==="
            ps aux | grep -E "linuxcnc|milltask|rtapi" | grep -v grep || true
            exit 1
          }

      - name: Start gRPC server
        run: |
          source ~/linuxcnc/scripts/rip-environment
          uv run python -m linuxcnc_grpc.server \
            --nc-files /tmp/e2e-nc-files &
          echo "GRPC_PID=$!" >> "$GITHUB_ENV"

          READY=false
          for i in $(seq 1 60); do
            if nc -z localhost 50051 2>/dev/null; then
              echo "gRPC server is ready"
              READY=true
              break
            fi
            sleep 1
          done
          if [ "$READY" != "true" ]; then
            echo "::error::gRPC server failed to start within 60 seconds"
            exit 1
          fi

      - name: Run e2e tests
        run: |
          source ~/linuxcnc/scripts/rip-environment
          uv run python -m pytest tests/test_e2e.py -v -m e2e --tb=long

      - name: Cleanup
        if: always()
        run: |
          kill "$GRPC_PID" 2>/dev/null || true
          kill "$XVFB_PID" 2>/dev/null || true
          pkill -f linuxcnc 2>/dev/null || true
          pkill -f milltask 2>/dev/null || true
          pkill -f rtapi 2>/dev/null || true
