name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_call:

env:
  PROTOC_VERSION: "32.1"

jobs:
  # Verify generated proto code is up-to-date
  proto-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: 'npm'
          cache-dependency-path: 'packages/node/package-lock.json'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache protoc binary
        id: cache-protoc
        uses: actions/cache@v5
        with:
          path: ~/protoc
          key: protoc-${{ env.PROTOC_VERSION }}-linux

      - name: Download protoc
        if: steps.cache-protoc.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/protoc
          curl -L "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip" -o ~/protoc/protoc.zip
          unzip ~/protoc/protoc.zip -d ~/protoc

      - name: Install protoc
        run: |
          sudo cp ~/protoc/bin/protoc /usr/local/bin/
          sudo cp -r ~/protoc/include/* /usr/local/include/
          protoc --version

      - name: Cache Cargo bin (protoc plugins)
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin
          key: cargo-bin-proto-plugins-${{ runner.os }}-v1

      - name: Install proto plugins
        run: |
          # Python (managed by uv from lockfile)
          uv sync --extra dev

          # Go (pin versions to match local development)
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.9
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1

          # Node.js
          cd packages/node && npm ci

          # Rust (skip if already cached)
          command -v protoc-gen-prost || cargo install protoc-gen-prost
          command -v protoc-gen-tonic || cargo install protoc-gen-tonic

      - name: Regenerate protos
        run: uv run ./scripts/generate-protos.sh --all

      - name: Check Rust proto sync
        run: |
          diff proto/linuxcnc.proto packages/rust/proto/linuxcnc.proto || {
            echo "::error::Rust proto files are out of sync with proto/. Run './scripts/generate-protos.sh --all' to sync."
            exit 1
          }
          diff proto/hal.proto packages/rust/proto/hal.proto || {
            echo "::error::Rust proto files are out of sync with proto/. Run './scripts/generate-protos.sh --all' to sync."
            exit 1
          }

      - name: Check for uncommitted changes
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated proto code is out of date. Run './scripts/generate-protos.sh --all' and commit the changes."
            exit 1
          fi

  # Python linting
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Check syntax
        run: |
          uv run python -m py_compile src/linuxcnc_grpc/*.py
          uv run python -m py_compile examples/python/*.py

  # Python tests
  test-python:
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Run tests
        run: uv run python -m pytest tests/ -v --tb=short --ignore=tests/test_e2e.py

  # Node.js tests
  test-node:
    name: test-node (22)
    runs-on: ubuntu-latest
    needs: [test-python]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: 'npm'
          cache-dependency-path: 'packages/node/package-lock.json'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python (for mock server)
        run: uv python install 3.12

      - name: Install Python dependencies
        run: uv sync --extra dev

      - name: Add Python to PATH
        run: echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: cd packages/node && npm ci

      - name: Run tests
        run: cd packages/node && npm test

  # Rust tests
  test-rust:
    name: test-rust (stable)
    runs-on: ubuntu-latest
    needs: [test-python]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python (for mock server)
        run: uv python install 3.12

      - name: Install Python dependencies
        run: uv sync --extra dev

      - name: Cache protoc binary
        id: cache-protoc
        uses: actions/cache@v5
        with:
          path: ~/protoc
          key: protoc-${{ env.PROTOC_VERSION }}-linux

      - name: Download protoc
        if: steps.cache-protoc.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/protoc
          curl -L "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip" -o ~/protoc/protoc.zip
          unzip ~/protoc/protoc.zip -d ~/protoc

      - name: Install protoc
        run: |
          sudo cp ~/protoc/bin/protoc /usr/local/bin/
          sudo cp -r ~/protoc/include/* /usr/local/include/

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/rust -> target
          shared-key: rust-ci
          cache-on-failure: true

      - name: Add Python to PATH
        run: echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Run tests
        run: cd packages/rust && cargo test

  # Go tests
  test-go:
    name: test-go (1.24)
    runs-on: ubuntu-latest
    needs: [test-python]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python (for mock server)
        run: uv python install 3.12

      - name: Install Python dependencies
        run: uv sync --extra dev

      - name: Add Python to PATH
        run: echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Run tests
        run: go test -v ./...

  # Integration tests - Python examples against mock server
  examples-python:
    runs-on: ubuntu-latest
    needs: [test-python]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Python package
        run: uv sync --extra dev

      - name: Start mock server
        run: |
          uv run python tests/mock_server.py &
          MOCK_PID=$!
          READY=false
          for i in {1..30}; do
            if ! kill -0 $MOCK_PID 2>/dev/null; then
              echo "ERROR: Mock server process died"
              exit 1
            fi
            if nc -z localhost 50051 2>/dev/null; then
              echo "Mock server is ready"
              READY=true
              break
            fi
            sleep 0.5
          done
          if [ "$READY" != "true" ]; then
            echo "ERROR: Mock server failed to start within 15 seconds"
            exit 1
          fi

      - name: Test Python examples
        run: |
          uv run python examples/python/get_status.py --port 50051
          timeout 5 uv run python examples/python/stream_status.py --port 50051 || true
          uv run python examples/python/hal_query.py --port 50051 status

  # Integration tests - Go examples against mock server
  examples-go:
    runs-on: ubuntu-latest
    needs: [test-go]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python (for mock server)
        run: uv python install 3.12

      - name: Install Python package
        run: uv sync --extra dev

      - name: Start mock server
        run: |
          uv run python tests/mock_server.py &
          MOCK_PID=$!
          READY=false
          for i in {1..30}; do
            if ! kill -0 $MOCK_PID 2>/dev/null; then
              echo "ERROR: Mock server process died"
              exit 1
            fi
            if nc -z localhost 50051 2>/dev/null; then
              echo "Mock server is ready"
              READY=true
              break
            fi
            sleep 0.5
          done
          if [ "$READY" != "true" ]; then
            echo "ERROR: Mock server failed to start within 15 seconds"
            exit 1
          fi

      - name: Test Go examples
        run: |
          cd examples/go
          go run ./cmd/get_status --port 50051
          timeout 5 go run ./cmd/stream_status --port 50051 || true
          go run ./cmd/hal_query --port 50051 status

  # Integration tests - Node.js examples against mock server
  examples-node:
    runs-on: ubuntu-latest
    needs: [test-node]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: 'npm'
          cache-dependency-path: |
            packages/node/package-lock.json
            examples/node/package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python (for mock server)
        run: uv python install 3.12

      - name: Install Python package
        run: uv sync --extra dev

      - name: Build Node package
        run: cd packages/node && npm ci && npm run build

      - name: Install Node example dependencies
        run: cd examples/node && npm ci

      - name: Start mock server
        run: |
          uv run python tests/mock_server.py &
          MOCK_PID=$!
          READY=false
          for i in {1..30}; do
            if ! kill -0 $MOCK_PID 2>/dev/null; then
              echo "ERROR: Mock server process died"
              exit 1
            fi
            if nc -z localhost 50051 2>/dev/null; then
              echo "Mock server is ready"
              READY=true
              break
            fi
            sleep 0.5
          done
          if [ "$READY" != "true" ]; then
            echo "ERROR: Mock server failed to start within 15 seconds"
            exit 1
          fi

      - name: Test Node examples
        run: |
          cd examples/node
          npx tsx get_status.ts --port 50051
          timeout 5 npx tsx stream_status.ts --port 50051 || true
          npx tsx hal_query.ts --port 50051 status

  # Integration tests - Rust examples against mock server
  examples-rust:
    runs-on: ubuntu-latest
    needs: [test-rust]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python (for mock server)
        run: uv python install 3.12

      - name: Install Python package
        run: uv sync --extra dev

      - name: Cache protoc binary
        id: cache-protoc
        uses: actions/cache@v5
        with:
          path: ~/protoc
          key: protoc-${{ env.PROTOC_VERSION }}-linux

      - name: Download protoc
        if: steps.cache-protoc.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/protoc
          curl -L "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip" -o ~/protoc/protoc.zip
          unzip ~/protoc/protoc.zip -d ~/protoc

      - name: Install protoc
        run: |
          sudo cp ~/protoc/bin/protoc /usr/local/bin/
          sudo cp -r ~/protoc/include/* /usr/local/include/

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/rust -> target
            examples/rust -> target
          shared-key: rust-ci
          cache-on-failure: true

      - name: Build Rust examples
        run: cd examples/rust && cargo build --release

      - name: Start mock server
        run: |
          uv run python tests/mock_server.py &
          MOCK_PID=$!
          READY=false
          for i in {1..30}; do
            if ! kill -0 $MOCK_PID 2>/dev/null; then
              echo "ERROR: Mock server process died"
              exit 1
            fi
            if nc -z localhost 50051 2>/dev/null; then
              echo "Mock server is ready"
              READY=true
              break
            fi
            sleep 0.5
          done
          if [ "$READY" != "true" ]; then
            echo "ERROR: Mock server failed to start within 15 seconds"
            exit 1
          fi

      - name: Test Rust examples
        run: |
          cd examples/rust
          ./target/release/get_status --port 50051
          timeout 5 ./target/release/stream_status --port 50051 || true
          ./target/release/hal_query --port 50051 status
