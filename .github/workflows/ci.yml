name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # Verify generated proto code is up-to-date
  proto-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install protoc
        run: |
          PROTOC_VERSION=32.1
          curl -LO "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          sudo unzip -o "protoc-${PROTOC_VERSION}-linux-x86_64.zip" -d /usr/local
          rm "protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          protoc --version

      - name: Install proto plugins
        run: |
          # Python
          pip install grpcio-tools

          # Go (pin versions to match local development)
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.9
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1

          # Node.js
          cd packages/node && npm ci

          # Rust
          cargo install protoc-gen-prost protoc-gen-tonic

      - name: Regenerate protos
        run: ./scripts/generate-protos.sh --all

      - name: Check for uncommitted changes
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated proto code is out of date. Run './scripts/generate-protos.sh --all' and commit the changes."
            exit 1
          fi

  # Python linting
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check syntax
        run: |
          python -m py_compile src/linuxcnc_grpc/*.py
          python -m py_compile examples/python/*.py

  # Python tests
  test-python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

  # Node.js tests
  test-node:
    name: test-node (20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python (for mock server)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Install dependencies
        run: cd packages/node && npm ci

      - name: Run tests
        run: cd packages/node && npm test

  # Rust tests
  test-rust:
    name: test-rust (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python (for mock server)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Install protoc
        run: |
          PROTOC_VERSION=32.1
          curl -LO "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          sudo unzip -o "protoc-${PROTOC_VERSION}-linux-x86_64.zip" -d /usr/local
          rm "protoc-${PROTOC_VERSION}-linux-x86_64.zip"

      - name: Run tests
        run: cd packages/rust && cargo test

  # Go tests
  test-go:
    name: test-go (1.24)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Set up Python (for mock server)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: go test -v ./...

  # Build Python package
  build:
    runs-on: ubuntu-latest
    needs: [lint, test-python]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Verify package installs
        run: pip install dist/*.whl

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # Integration tests - run examples against mock server
  test-examples:
    runs-on: ubuntu-latest
    needs: [proto-check, test-python, test-node, test-rust, test-go]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python package
        run: pip install -e ".[dev]"

      - name: Install Go dependencies
        run: cd examples/go && go mod download

      - name: Build Node package
        run: cd packages/node && npm ci && npm run build

      - name: Install Node example dependencies
        run: cd examples/node && npm ci

      - name: Start mock server
        run: |
          python tests/mock_server.py &
          # Wait for server to be ready
          for i in {1..30}; do
            if nc -z localhost 50051 2>/dev/null; then
              echo "Mock server is ready"
              break
            fi
            sleep 0.5
          done

      - name: Test Python examples
        run: |
          python examples/python/get_status.py --port 50051
          timeout 5 python examples/python/stream_status.py --port 50051 || true
          python examples/python/hal_query.py --port 50051 status

      - name: Test Go examples
        run: |
          cd examples/go
          go run ./cmd/get_status --port 50051
          timeout 5 go run ./cmd/stream_status --port 50051 || true
          go run ./cmd/hal_query --port 50051 status

      - name: Test Node examples
        run: |
          cd examples/node
          npx tsx get_status.ts --port 50051
          timeout 5 npx tsx stream_status.ts --port 50051 || true
          npx tsx hal_query.ts --port 50051 status
