name: Release

on:
  workflow_dispatch:
    # Manual trigger for publishing releases
    inputs:
      dry_run:
        description: "Dry run (validate without publishing)"
        required: false
        type: boolean
        default: false
      create_tag:
        description: "Create git tag after successful release"
        required: false
        type: boolean
        default: true

jobs:
  # Pre-flight checks: version consistency and tag validation
  preflight:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Check version consistency
        id: version
        run: |
          source scripts/common.sh

          PY_VER=$(get_python_version)
          NODE_VER=$(get_node_version)
          RUST_VER=$(get_rust_version)

          echo "Python version: $PY_VER"
          echo "Node.js version: $NODE_VER"
          echo "Rust version: $RUST_VER"

          # Normalize to semver for comparison (PEP 440 0.6.0b1 == semver 0.6.0-beta.1)
          PY_NORM=$(normalize_version "$PY_VER")
          NODE_NORM=$(normalize_version "$NODE_VER")
          RUST_NORM=$(normalize_version "$RUST_VER")

          if [ "$PY_NORM" != "$NODE_NORM" ] || [ "$NODE_NORM" != "$RUST_NORM" ]; then
            echo "::error::Version mismatch! Python=$PY_VER ($PY_NORM), Node=$NODE_VER ($NODE_NORM), Rust=$RUST_VER ($RUST_NORM)"
            echo "Run 'make sync-version VERSION=x.y.z' to synchronize versions"
            exit 1
          fi

          # Output semver form for downstream jobs (tags, release notes)
          echo "version=$NODE_VER" >> "$GITHUB_OUTPUT"
          echo "All packages at version: $NODE_VER (normalized: $NODE_NORM)"

      - name: Check tag doesn't already exist
        if: ${{ inputs.create_tag && !inputs.dry_run }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists. Bump version before releasing."
            exit 1
          fi
          echo "Tag $TAG is available"

  # Run full CI suite
  ci:
    needs: preflight
    uses: ./.github/workflows/ci.yml

  # Publish Python to PyPI
  publish-python:
    needs: [preflight, ci]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install build tools
        run: uv sync --extra build

      - name: Build package
        run: uv run ./scripts/build-python.sh

      - name: Validate package
        run: uv run twine check dist/*

      - name: Verify build artifacts match version
        run: |
          source scripts/common.sh
          EXPECTED=$(get_python_version)
          for artifact in dist/*; do
            basename="$(basename "$artifact")"
            if ! echo "$basename" | grep -q "$EXPECTED"; then
              echo "::error::Stale artifact: $basename (expected version $EXPECTED)"
              exit 1
            fi
          done
          echo "All artifacts match version $EXPECTED"

      - name: Publish to PyPI
        if: ${{ !inputs.dry_run }}
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: echo "Dry run - would publish Python ${{ needs.preflight.outputs.version }} to PyPI"

  # Publish Node.js to npm
  publish-node:
    needs: [preflight, ci]
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.14"
          cache: 'npm'
          cache-dependency-path: 'packages/node/package-lock.json'

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install and build
        run: cd packages/node && npm ci && npm run build

      - name: Verify package version
        run: |
          cd packages/node
          EXPECTED="${{ needs.preflight.outputs.version }}"
          ACTUAL=$(node -p "require('./package.json').version")
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::Package version mismatch: got $ACTUAL, expected $EXPECTED"
            exit 1
          fi
          echo "Package version verified: $ACTUAL"

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        run: |
          cd packages/node
          VERSION="${{ needs.preflight.outputs.version }}"
          TAG_ARGS=""
          if echo "$VERSION" | grep -q -- '-alpha\.\|-beta\.\|-rc\.'; then
            TAG=$(echo "$VERSION" | sed 's/.*-\(alpha\|beta\|rc\)\..*/\1/')
            TAG_ARGS="--tag $TAG"
            echo "Pre-release detected: publishing with --tag $TAG"
          fi
          npm publish --access public --provenance $TAG_ARGS

      - name: Dry run validation
        if: ${{ inputs.dry_run }}
        run: |
          cd packages/node
          VERSION="${{ needs.preflight.outputs.version }}"
          if echo "$VERSION" | grep -q -- '-alpha\.\|-beta\.\|-rc\.'; then
            TAG=$(echo "$VERSION" | sed 's/.*-\(alpha\|beta\|rc\)\..*/\1/')
            echo "Would publish with --tag $TAG"
          fi
          npm publish --dry-run --access public
          echo "Dry run - would publish Node.js $VERSION to npm"

  # Publish Rust to crates.io (uses OIDC trusted publishing)
  publish-rust:
    needs: [preflight, ci]
    runs-on: ubuntu-latest
    environment: crates
    permissions:
      contents: read
      id-token: write
    env:
      PROTOC_VERSION: "32.1"
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache protoc binary
        id: cache-protoc
        uses: actions/cache@v5
        with:
          path: ~/protoc
          key: protoc-${{ env.PROTOC_VERSION }}-linux

      - name: Download protoc
        if: steps.cache-protoc.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/protoc
          curl -L "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip" -o ~/protoc/protoc.zip
          unzip ~/protoc/protoc.zip -d ~/protoc

      - name: Install protoc
        run: |
          sudo cp ~/protoc/bin/protoc /usr/local/bin/
          sudo cp -r ~/protoc/include/* /usr/local/include/

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/rust -> target

      - name: Verify crate version
        run: |
          cd packages/rust
          EXPECTED="${{ needs.preflight.outputs.version }}"
          ACTUAL=$(grep -E '^version[[:space:]]*=' Cargo.toml | head -1 | sed 's/.*=[[:space:]]*"\([^"]*\)".*/\1/')
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::Crate version mismatch: got $ACTUAL, expected $EXPECTED"
            exit 1
          fi
          echo "Crate version verified: $ACTUAL"

      - name: Authenticate with crates.io
        if: ${{ !inputs.dry_run }}
        uses: rust-lang/crates-io-auth-action@v1
        id: crates-auth

      - name: Publish to crates.io
        if: ${{ !inputs.dry_run }}
        run: cd packages/rust && cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}

      - name: Dry run validation
        if: ${{ inputs.dry_run }}
        run: |
          cd packages/rust && cargo publish --dry-run
          echo "Dry run - would publish Rust ${{ needs.preflight.outputs.version }} to crates.io"

  # Create git tag and GitHub Release after all publishes succeed
  create-release:
    needs: [preflight, publish-python, publish-node, publish-rust]
    if: ${{ inputs.create_tag && !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create and push tag
        run: |
          TAG="v${{ needs.preflight.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.preflight.outputs.version }}"
          name: "Release v${{ needs.preflight.outputs.version }}"
          prerelease: ${{ contains(needs.preflight.outputs.version, '-') }}
          body: |
            ## Packages Published

            - **PyPI**: [linuxcnc-grpc ${{ needs.preflight.outputs.version }}](https://pypi.org/project/linuxcnc-grpc/${{ needs.preflight.outputs.version }}/)
            - **npm**: [linuxcnc-grpc ${{ needs.preflight.outputs.version }}](https://www.npmjs.com/package/linuxcnc-grpc/v/${{ needs.preflight.outputs.version }})
            - **crates.io**: [linuxcnc-grpc ${{ needs.preflight.outputs.version }}](https://crates.io/crates/linuxcnc-grpc/${{ needs.preflight.outputs.version }})
            - **Go**: `go get github.com/dougcalobrisi/linuxcnc-grpc@v${{ needs.preflight.outputs.version }}`
          generate_release_notes: true
